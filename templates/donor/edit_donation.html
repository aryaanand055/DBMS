{% extends 'base.html' %}
{% block title %}Edit Donation — FoodShare{% endblock %}
{% block content %}
<div class="container dashboard-page">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="page-header">
                <div>
                    <h3 class="page-header-title">
                        <i class="fa fa-edit me-2" style="color:var(--accent-l);"></i>Edit Donation
                    </h3>
                    <p class="page-header-sub">Update your donation details.</p>
                </div>
            </div>
            <div class="card border-0">
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Food Type <span class="text-danger">*</span></label>
                            <input type="text" name="food_type" class="form-control" value="{{ donation.food_type }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantity <span class="text-danger">*</span></label>
                            <input type="text" name="quantity" class="form-control" value="{{ donation.quantity }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pickup Location <span class="text-danger">*</span></label>
                            <input type="text" name="location" class="form-control" value="{{ donation.location }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Expiry Date &amp; Time <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="expiry_time" class="form-control"
                                   value="{{ donation.expiry_time.strftime('%Y-%m-%dT%H:%M') if donation.expiry_time else '' }}" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Description (optional)</label>
                            <textarea name="description" class="form-control" rows="3">{{ donation.description or '' }}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary fw-semibold flex-fill py-2">
                                <i class="fa fa-save me-2"></i>Save Changes
                            </button>
                            <a href="{{ url_for('donor_dashboard') }}" class="btn btn-outline-secondary flex-fill py-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
