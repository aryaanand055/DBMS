{% extends 'base.html' %}
{% block title %}Add Donation — FoodShare{% endblock %}
{% block content %}
<div class="container dashboard-page">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="page-header">
                <div>
                    <h3 class="page-header-title">
                        <i class="fa fa-plus me-2" style="color:var(--warm-l);"></i>Add New Donation
                    </h3>
                    <p class="page-header-sub">Your surplus food can become someone's only meal today.</p>
                </div>
            </div>
            <div class="card border-0">
                <div class="card-body p-4">
                    <form method="post">
                        <div class="mb-3">
                            <label class="form-label">Food Type <span class="text-danger">*</span></label>
                            <input type="text" name="food_type" class="form-control" placeholder="e.g. Rice, Bread, Vegetables, Cooked Meal" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantity <span class="text-danger">*</span></label>
                            <input type="text" name="quantity" class="form-control" placeholder="e.g. 10 kg, 50 servings, 30 pieces" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pickup Location <span class="text-danger">*</span></label>
                            <input type="text" name="location" class="form-control" placeholder="Full address for pickup" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Expiry Date &amp; Time <span class="text-danger">*</span></label>
                            <input type="datetime-local" name="expiry_time" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Description (optional)</label>
                            <textarea name="description" class="form-control" rows="3" placeholder="Any details — allergens, packaging, special instructions..."></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-accent fw-semibold flex-fill py-2">
                                <i class="fa fa-heart me-2"></i>Submit Donation
                            </button>
                            <a href="{{ url_for('donor_dashboard') }}" class="btn btn-outline-secondary flex-fill py-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
