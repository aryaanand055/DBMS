{% extends 'base.html' %}
{% block title %}Register - FoodShare{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-4">
                <h4 class="fw-bold text-center mb-4"><i class="fa fa-user-plus text-warning me-2"></i>Create Account</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role <span class="text-danger">*</span></label>
                        <select name="role" class="form-select" required>
                            <option value="">Select a role...</option>
                            <option value="donor">Donor</option>
                            <option value="ngo">NGO / Volunteer</option>
                            <option value="receiver">Receiver</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Phone (optional)</label>
                        <input type="tel" name="phone" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-semibold">Register</button>
                </form>
                <hr>
                <p class="text-center mb-0 small">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
