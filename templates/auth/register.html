{% extends 'base.html' %}
{% block title %}Join FoodShare — Register{% endblock %}
{% block content %}
<div class="auth-page" style="align-items:flex-start;padding-top:3rem;padding-bottom:3rem;">
    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>
    <div class="auth-card p-4 p-lg-5" style="max-width:520px;">
        <div class="text-center mb-4">
            <div class="auth-icon mb-3"><i class="fa fa-heart"></i></div>
            <h4 class="auth-title mb-1">Join the Mission</h4>
            <p class="auth-subtitle mb-0">Every account created brings us one step closer to a hunger-free world.</p>
        </div>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" placeholder="Choose a strong password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Your Role <span class="text-danger">*</span></label>
                <select name="role" class="form-select" required>
                    <option value="">Select how you want to help...</option>
                    <option value="donor">Donor — I have food to share</option>
                    <option value="ngo">NGO / Volunteer — I bridge the gap</option>
                    <option value="receiver">Receiver — I need food assistance</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label">Phone (optional)</label>
                <input type="tel" name="phone" class="form-control" placeholder="+91 XXXXX XXXXX">
            </div>
            <button type="submit" class="btn btn-accent w-100 fw-semibold py-2">
                <i class="fa fa-user-plus me-2"></i>Create Account
            </button>
        </form>
        <hr class="auth-divider">
        <p class="text-center mb-0 small" style="color:var(--text-dim);">
            Already have an account?
            <a href="{{ url_for('login') }}">Sign in here</a>
        </p>
    </div>
</div>
{% endblock %}
