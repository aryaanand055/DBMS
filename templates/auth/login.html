{% extends 'base.html' %}
{% block title %}Login - FoodShare{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-4">
                <h4 class="fw-bold text-center mb-4"><i class="fa fa-sign-in-alt text-warning me-2"></i>Login</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-semibold">Login</button>
                </form>
                <hr>
                <p class="text-center mb-0 small">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
